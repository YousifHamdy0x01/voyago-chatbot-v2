version: "3.9"

services:
  voyago-chatbot:
    build: .
    container_name: voyago-chatbot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./data:/app/data   # persist trained model cache
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
